# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - bookstore-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Show mvn version (debug)
        run: ./mvnw -v || mvn -v || true

      - name: Build with Maven (Skip tests) using Maven Wrapper
        run: ./mvnw -B clean package -DskipTests

      - name: Show target directory (debug)
        run: |
          echo "=== ls -la target ==="
          ls -la target || true

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: 'target/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
  
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
      
      - name: Show downloaded artifact files (debug)
        run: |
          echo "=== ls -la workspace after download ==="
          ls -la || true
          echo "=== find jars ==="
          find . -type f -name "*.jar" -maxdepth 4 || true
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_55A1D886E768481D976BD09B505CCDBC }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2E5FB77DDFB247BC839B8234C9DC58E5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_014F9ADC287F45C5B15E205EF113640C }}

      - name: Prepare deploy package (debug)
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== ls -la (root) ==="
          ls -la || true
          echo "=== find bookStore jars ==="
          find . -type f -name "bookStore-*.jar" -maxdepth 4 || true
          echo "Will use pattern: **/bookStore-*.jar"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'bookstore-app'
          # match the built jar wherever it was expanded in the workspace
          package: '**/bookStore-*.jar'

          
